<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suzanne's Art Collection</title>
  
  <!-- Modern jQuery via CDN -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  
  <!-- Medium Zoom library (lightweight, no extra CSS needed) -->
  <script src="https://cdn.jsdelivr.net/npm/medium-zoom@1.0.8/dist/medium-zoom.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0a0a1a;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      color: #e8e6e0;
    }

    #sidebar {
      width: 280px;
      min-height: 100vh;
      background: rgba(10, 10, 30, 0.95);
      padding: 30px 20px;
      box-sizing: border-box;
      border-right: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      flex-shrink: 0;
    }

    #sidebar::-webkit-scrollbar { width: 6px; }
    #sidebar::-webkit-scrollbar-thumb { background: #8a7a5a; border-radius: 3px; }

    .sidebar-title {
      color: #d4c9b0; font-weight: 300; letter-spacing: 2px; margin: 0 0 5px 0; font-size: 1.6rem;
    }
    .sidebar-subtitle {
      color: #b0a890; font-size: 0.85rem; font-style: italic; margin-bottom: 25px;
    }

    .back-btn {
      display: inline-block; background: rgba(255,255,255,0.06); color: #c0b090;
      text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 0.9rem;
      margin-bottom: 20px; transition: background 0.2s, color 0.2s;
      border: 1px solid rgba(255,255,255,0.08); width: fit-content;
    }
    .back-btn:hover { background: #8a7a5a; color: #1a1a2a; }

    #collection-list { list-style: none; padding: 0; margin: 0; flex: 1; overflow-y: auto; }
    #collection-list li {
      padding: 12px 16px; margin-bottom: 4px; border-radius: 8px; cursor: pointer;
      transition: background 0.2s, color 0.2s; font-size: 0.95rem; color: #b0a890;
    }
    #collection-list li:hover { background: rgba(255,255,255,0.05); color: #d4c9b0; }
    #collection-list li.active { background: #8a7a5a; color: #1a1a2a; font-weight: 600; }

    #main-content { flex: 1; padding: 40px; display: flex; justify-content: center; align-items: center; box-sizing: border-box; }

    #gallery-box {
      width: 100%; max-width: 900px; background: rgba(10, 10, 30, 0.85);
      border-radius: 16px; padding: 30px; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.06); text-align: center;
    }

    #collection-title { font-size: 1.8rem; font-weight: 300; color: #d4c9b0; margin: 0 0 4px 0; }
    #collection-metadata { font-size: 0.9rem; color: #b0a890; font-style: italic; margin-bottom: 20px; }

    #image-container {
      position: relative; width: 100%; max-height: 60vh; display: flex;
      justify-content: center; align-items: center; background: rgba(0,0,0,0.3);
      border-radius: 12px; overflow: hidden; margin-bottom: 16px;
    }
    
    #gallery-image {
      max-width: 100%; max-height: 60vh; object-fit: contain; display: block;
      cursor: zoom-in; /* Indicates to users they can click to zoom */
      transition: transform 0.2s ease;
    }
    
    #image-error { display: none; color: #e8a0a0; padding: 40px; text-align: center; }
    #image-error.show { display: block; }
    
    #image-counter {
      position: absolute; bottom: 12px; right: 16px; background: rgba(0,0,0,0.7);
      color: #d4c9b0; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem;
    }

    #image-caption { font-size: 1rem; color: #c0b090; min-height: 2.5em; padding: 0 10px; margin-bottom: 16px; line-height: 1.5; }

    #nav-buttons { display: flex; justify-content: center; gap: 20px; }
    #nav-buttons button {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      color: #e8e6e0; padding: 10px 24px; border-radius: 8px; cursor: pointer;
      font-size: 0.95rem; transition: background 0.2s; min-width: 100px;
    }
    #nav-buttons button:hover:not(:disabled) { background: #8a7a5a; color: #1a1a2a; }
    #nav-buttons button:disabled { opacity: 0.3; cursor: not-allowed; }

    .main-footer { margin-top: 30px; font-size: 0.7rem; color: #5a5a4a; text-align: center; border-top: 1px solid rgba(255,255,255,0.04); padding-top: 16px; }

    @media (max-width: 800px) {
      body { flex-direction: column; }
      #sidebar { width: 100%; min-height: auto; height: auto; position: relative; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08); padding: 20px; }
      #collection-list { max-height: 200px; }
      #main-content { padding: 20px; }
      #gallery-box { padding: 20px; }
    }
  </style>
</head>
<body>

<div id="sidebar">
  <h1 class="sidebar-title">Art Collection</h1>
  <div class="sidebar-subtitle">Original photography</div>
  <a href="fun.html" class="back-btn">← Back to Fun</a>
  <ul id="collection-list"></ul>
</div>

<div id="main-content">
  <div id="gallery-box">
    <h2 id="collection-title">Loading...</h2>
    <div id="collection-metadata"></div>

    <div id="image-container">
      <!-- Added 'data-zoomable' for Medium Zoom -->
      <img id="gallery-image" src="" alt="Artwork" data-zoomable>
      <div id="image-error">
        <strong>⚠ Image not found</strong><br>
        <span id="error-path">Check file path and name</span>
      </div>
      <span id="image-counter"></span>
    </div>

    <div id="image-caption"></div>

    <div id="nav-buttons">
      <button id="prev-image" disabled>← Previous</button>
      <button id="next-image" disabled>Next →</button>
    </div>

    <div class="main-footer">
      &copy; 2023 Suzanne Thornton. All Rights Reserved.
    </div>
  </div>
</div>

<script>
  $(document).ready(function() {

    // ============================================================
    // 1. YOUR ART COLLECTIONS DATABASE
    // ============================================================
    const collectionsData = [
      {
        id: "strange-fruit",
        title: "Zoe Leonard: Strange Fruit",
        metadata: "Philadelphia Museum of Art, March 2023",
        images: [
          {
            src: "images/StrangeFruit1.png?v=1",
            caption: "Installation view of 'Strange Fruit' (1992–97) – empty fruit skins sewn together."
          },
          {
            src: "images/StrangeFruit2.png?v=1",
            caption: "Detail: Each fruit skin is carefully sewn, preserving the shape of the original fruit."
          },
          {
            src: "images/StrangeFruit3.png?v=1",
            caption: "The pieces are meant to decay over time, a meditation on mortality and neglect."
          }
        ]
      }
    ];

    // ============================================================
    // 2. APP STATE
    // ============================================================
    let currentCollectionIndex = 0;
    let currentImageIndex = 0;
    let currentCollection = null;
    let zoomInstance = null; // Stores the medium-zoom instance

    // ============================================================
    // 3. CORE FUNCTIONS
    // ============================================================

    function renderCollectionList() {
      const listHtml = collectionsData.map((coll, index) => {
        const activeClass = (index === currentCollectionIndex) ? 'active' : '';
        return `<li class="${activeClass}" data-index="${index}">${coll.title}</li>`;
      }).join('');
      $('#collection-list').html(listHtml);
    }

    function loadCollection(index) {
      if (index < 0 || index >= collectionsData.length) return;
      
      currentCollectionIndex = index;
      currentCollection = collectionsData[index];
      currentImageIndex = 0;

      renderCollectionList();

      $('#collection-title').text(currentCollection.title);
      $('#collection-metadata').text(currentCollection.metadata);

      displayImage(currentImageIndex);
    }

    function displayImage(index) {
      if (!currentCollection || index < 0 || index >= currentCollection.images.length) {
        return;
      }

      const imageData = currentCollection.images[index];
      const img = $('#gallery-image');
      const errorDiv = $('#image-error');
      const errorPath = $('#error-path');

      errorDiv.removeClass('show');
      img.show();

      // Set the image
      img.attr('src', imageData.src);
      img.attr('alt', imageData.caption);
      $('#image-caption').text(imageData.caption);
      errorPath.text(`Failed to load: ${imageData.src}`);

      $('#image-counter').text(`${index + 1} / ${currentCollection.images.length}`);
      $('#prev-image').prop('disabled', index === 0);
      $('#next-image').prop('disabled', index === currentCollection.images.length - 1);

      // Re-initialize zoom on the new image
      if (zoomInstance) {
        zoomInstance.detach(); // remove zoom from old image
      }
      
      // Wait a tiny moment for the new image to load, then attach zoom
      setTimeout(() => {
        zoomInstance = mediumZoom('#gallery-image', {
          margin: 40,           // 40px margin around the zoomed image
          background: 'rgba(10, 10, 30, 0.9)', // dark background for zoom
          scrollOffset: 40
        });
      }, 100);

      // Handle load error
      img.on('error', function() {
        img.hide();
        errorDiv.addClass('show');
        console.error('Image failed to load:', imageData.src);
      });
    }

    // ============================================================
    // 4. EVENT LISTENERS
    // ============================================================

    $(document).on('click', '#collection-list li', function() {
      const index = parseInt($(this).data('index'));
      if (index !== currentCollectionIndex) {
        loadCollection(index);
      }
    });

    $('#prev-image').click(function() {
      if (currentImageIndex > 0) {
        currentImageIndex--;
        displayImage(currentImageIndex);
      }
    });

    $('#next-image').click(function() {
      if (currentImageIndex < currentCollection.images.length - 1) {
        currentImageIndex++;
        displayImage(currentImageIndex);
      }
    });

    // ============================================================
    // 5. INITIAL LOAD
    // ============================================================

    if (collectionsData.length > 0) {
      loadCollection(0);
    } else {
      $('#collection-title').text('No collections yet.');
      $('#collection-metadata').text('Add your art collections to the JSON data.');
    }

  });
</script>

</body>
</html>
